services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-retroboard}
    volumes:
      - db-data:/var/lib/postgresql/data
    # Bind to drascula's loopback only so the port is reachable via SSH tunnel
    # (e.g. for DataGrip) without being exposed on the LAN/Tailscale.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retro} -d ${POSTGRES_DB:-retroboard}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB:-retroboard};Username=${POSTGRES_USER:-retro};Password=${POSTGRES_PASSWORD}

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8081}:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?CLOUDFLARED_TOKEN must be set}
    depends_on:
      - web

volumes:
  db-data:
