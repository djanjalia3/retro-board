services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: retro
      POSTGRES_PASSWORD: retro
      POSTGRES_DB: retroboard
    ports:
      - "5433:5432"
    volumes:
      - retroboard-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retro -d retroboard"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  retroboard-pg:
